<svg width="480" height="320" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <title>VIRIYA — Primary Logo (Light)</title>
  <desc>VIRIYA (วิริยะ) primary logo on white background with tagline</desc>

  <!-- White background -->
  <rect width="480" height="320" fill="#FFFFFF"/>

  <!-- V mark — left arm -->
  <polygon points="172,28 195,28 240,158 217,158" fill="#26215C"/>
  <!-- V mark — right arm -->
  <polygon points="308,28 285,28 240,158 263,158" fill="#26215C"/>

  <!-- Flame outer (amber) -->
  <polygon points="240,63 235,137 245,137" fill="#EF9F27"/>
  <!-- Flame inner highlight -->
  <polygon points="240,79 238,118 242,118" fill="#FAC775"/>
  <!-- Apex glow -->
  <circle cx="240" cy="58" r="5.5" fill="#FAC775"/>
  <circle cx="240" cy="58" r="2.5" fill="#FFFFFF"/>

  <!-- Wordmark -->
  <text x="244" y="198"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="40" font-weight="500"
    fill="#26215C" letter-spacing="14"
    text-anchor="middle">VIRIYA</text>

  <!-- Thai name -->
  <text x="240" y="224"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="15" font-weight="400"
    fill="#7F77DD" letter-spacing="4"
    text-anchor="middle">วิริยะ</text>

  <!-- Divider -->
  <line x1="140" y1="248" x2="340" y2="248" stroke="#E0DED7" stroke-width="0.75"/>

  <!-- Tagline EN -->
  <text x="240" y="272"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="17" font-weight="500"
    fill="#26215C" letter-spacing="0.3"
    text-anchor="middle">Relentlessly Relevant.</text>

  <!-- Tagline TH -->
  <text x="240" y="294"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="400"
    fill="#7F77DD" letter-spacing="0.8"
    text-anchor="middle">เพียรพยายามในทุกคำตอบ</text>
</svg>
